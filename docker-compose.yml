version: "3.9"

services:
  backend:
    build: ./backend
    container_name: lab-backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/labdb
    depends_on:
      - postgres
    restart: always

  frontend:
    build: ./lab-inventory-ui
    container_name: lab-frontend
    ports:
      - "5174:5174"
    volumes:
      - ./lab-inventory-ui:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  postgres:
    image: postgres:15
    container_name: lab-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: labdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

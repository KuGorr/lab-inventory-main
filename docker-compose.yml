version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: lab_inventory_postgres
    restart: always
    environment:
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD: labpass
      POSTGRES_DB: labdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - labnet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lab_inventory_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg2://labuser:labpass@postgres:5432/labdb
    ports:
      - "8001:8000"
    depends_on:
      - postgres
    networks:
      - labnet

  frontend:
    build:
      context: ./lab-inventory-ui
      dockerfile: Dockerfile
    container_name: lab_inventory_frontend
    restart: always
    ports:
      - "5174:5173"
    depends_on:
      - backend
    networks:
      - labnet

networks:
  labnet:

volumes:
  postgres_data:
